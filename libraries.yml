libraries:
  - id:          honeybee-ph
    repo:        PH-Tools/honeybee_ph
    label:       Honeybee-PH
    docs_path:   docs/
    branch:      main
    enabled:     true
    index:       "01"
    tag_line:    "GRASSHOPPER · PYTHON"
    category:    "Modeling"
    description: "Grasshopper-native Passive House modeling. Build PH-compliant
                  models inside Rhino using familiar Honeybee components."
    source_paths:
      - honeybee_ph
      - honeybee_phhvac
    autodoc:
      enabled: true
      exclude_modules:
        - "honeybee_ph/cli"
        - "honeybee_ph/properties"
        - "honeybee_phhvac/properties"
      exclude_patterns:
        - "_*"
        - "test_*"
      include_patterns:
        - "_base.py"
      skip_methods:
        - "to_dict"
        - "from_dict"
        - "duplicate"
        - "__copy__"
        - "__str__"
        - "__repr__"
        - "__hash__"
        - "ToString"
      output_dir: "api"

  - id:          phx
    repo:        PH-Tools/PHX
    label:       PHX
    docs_path:   docs/
    branch:      main
    enabled:     true
    index:       "02"
    tag_line:    "PYTHON · DATA MODEL"
    category:    "Exchange"
    description: "Passive House Exchange data model & file I/O. Convert between
                  WUFI XML, PHPP Excel, and Phius report formats."
    source_paths:
      - PHX
    autodoc:
      enabled: true
      exclude_modules:
        - "PHX/cli"
      exclude_patterns:
        - "_*"
        - "test_*"
      include_patterns:
        - "_base.py"
      skip_methods:
        - "to_dict"
        - "from_dict"
        - "duplicate"
        - "__copy__"
        - "__str__"
        - "__repr__"
        - "__hash__"
        - "ToString"
      output_dir: "api"

  - id:          honeybee-revive
    repo:        PH-Tools/honeybee_revive
    label:       Honeybee-REVIVE
    docs_path:   docs/
    branch:      main
    enabled:     true
    index:       "03"
    tag_line:    "GRASSHOPPER · ANALYSIS"
    category:    "Analysis"
    description: "Carbon & energy analysis for building design. Resilience &
                  embodied-carbon workflows for Phius REVIVE."
    source_paths:
      - honeybee_revive
    autodoc:
      enabled: true
      exclude_modules:
        - "honeybee_revive/properties"
      exclude_patterns:
        - "_*"
        - "test_*"
      include_patterns:
        - "_base.py"
      skip_methods:
        - "to_dict"
        - "from_dict"
        - "duplicate"
        - "__copy__"
        - "__str__"
        - "__repr__"
        - "__hash__"
        - "ToString"
      output_dir: "api"

guides:
  - id:          llm-setup
    label:       LLM Setup
    href:        /guides/llm-setup/
    enabled:     true
    index:       "01"
    tag_line:    "AI · INTEGRATION"
    category:    "Guide"
    description: "Using AI coding tools with PH-Tools documentation.
                  Configure Claude, Cursor, or other LLM agents to
                  reference these docs automatically."
